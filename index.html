<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PENGHU VOYAGE | 5-Day Official Itinerary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Noto+Sans+TC:wght@100;300;400;500;700&display=swap');
        
        :root {
            --neon-green: #67e644; 
            --neon-green-dark: #4eb032;
            --neon-glow: rgba(103, 230, 68, 0.4);
            --noto-bg: #fdfdfb;
            --ocean-wave: rgba(103, 230, 68, 0.15);
            --glow-main: var(--neon-glow);
            --glow-sub: rgba(163, 255, 51, 0.2);
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            font-weight: 300;
            background-color: var(--noto-bg);
            color: #1a1a1a;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 背景與噪點 */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.05;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        /* 底部海浪效果 (低高度版) */
        .ocean-waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 10vh; 
            z-index: 2;
            pointer-events: none;
            opacity: 0.6;
        }
        .wave {
            background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x;
            position: absolute;
            bottom: -5px;
            width: 6400px;
            height: 100%;
            animation: wave 25s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            filter: hue-rotate(45deg) brightness(1.2); 
        }
        .wave:nth-of-type(2) {
            bottom: -15px;
            animation: wave 18s cubic-bezier(0.36, 0.45, 0.63, 0.53) -0.125s infinite, swell 6s ease -1.25s infinite;
            opacity: 0.5;
        }
        @keyframes wave {
            0% { margin-left: 0; }
            100% { margin-left: -1600px; }
        }
        @keyframes swell {
            0%, 100% { transform: translate3d(0, -10px, 0); }
            50% { transform: translate3d(0, 5px, 0); }
        }

        .visual-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .glow-spot-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
        }
        .glow-spot {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            mix-blend-mode: multiply;
            animation: glowMove 15s infinite alternate ease-in-out;
        }
        .spot-1 { width: 650px; height: 650px; background: radial-gradient(circle, var(--glow-main) 0%, rgba(255,255,255,0) 75%); top: -15%; left: -10%; animation-duration: 12s; }
        .spot-2 { width: 550px; height: 550px; background: radial-gradient(circle, var(--glow-sub) 0%, rgba(255,255,255,0) 70%); top: 35%; right: -15%; animation-delay: -3s; animation-duration: 18s; }
        @keyframes glowMove {
            0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            50% { transform: translate(5vw, 10vh) scale(1.1); opacity: 0.9; }
            100% { transform: translate(-3vw, 5vh) scale(0.95); opacity: 0.6; }
        }

        /* 打字機無限循環 */
        .typewriter-container {
            margin-bottom: 3rem;
            padding: 2rem 0;
            min-height: 220px;
        }
        .typewriter-line {
            font-size: clamp(3.5rem, 15vw, 6rem);
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: -0.03em;
            color: #000;
            display: block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid transparent;
            width: 0;
            line-height: 1.1;
        }
        .typewriter-line-1 {
            animation: typingCycle 8s steps(6, end) infinite, blinkCursor 0.8s step-end infinite;
        }
        .typewriter-line-2 {
            animation: typingCycle 8s steps(7, end) 1.2s infinite, blinkCursor 0.8s step-end infinite 1.2s;
        }
        @keyframes typingCycle {
            0% { width: 0; }
            20%, 80% { width: 100%; }
            90%, 100% { width: 0; }
        }
        @keyframes blinkCursor {
            from, to { border-color: transparent }
            50% { border-color: var(--neon-green) }
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
        }
        @media (min-width: 768px) {
            .content-wrapper { padding: 40px; }
        }

        .sub-accent {
            color: var(--neon-green-dark);
            font-weight: 600;
            letter-spacing: 0.2em;
        }

        .info-pill {
            font-size: 10px;
            letter-spacing: 0.1em;
            padding: 4px 12px;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 20px;
            background: white;
            color: #666;
            font-weight: 400;
        }

        .nav-link {
            font-size: 12px;
            font-weight: 300;
            color: #aaa;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: all 0.4s ease;
            position: relative;
            padding: 5px 0 12px 0;
            white-space: nowrap;
        }
        .nav-link.active { 
            color: var(--neon-green-dark); 
            font-weight: 600; 
        }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon-green);
            border-radius: 1px;
        }

        .itinerary-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 2.5rem;
            padding: 1.5rem;
            box-shadow: 0 20px 45px rgba(0,0,0,0.02);
            position: relative;
            z-index: 10;
        }
        @media (min-width: 768px) {
            .itinerary-card { padding: 3.5rem; border-radius: 3.5rem; }
        }

        .schedule-row {
            display: grid;
            grid-template-columns: 60px 1fr 40px;
            gap: 12px;
            padding: 22px 0;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            align-items: flex-start;
        }
        .time-label { 
            font-size: 11px; 
            font-weight: 600; 
            color: var(--neon-green-dark); 
            font-family: 'Inter'; 
            padding-top: 5px;
            letter-spacing: 0.05em;
        }
        .spot-name { 
            font-size: 17px; 
            font-weight: 500; 
            letter-spacing: 0.01em; 
            line-height: 1.4;
            color: #1a1a1a;
        }
        .spot-note { 
            font-size: 11px; 
            color: #666; 
            margin-top: 4px; 
            font-weight: 300; 
            line-height: 1.5; 
            opacity: 0.8;
        }

        .map-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #f4faf2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-green-dark);
            transition: all 0.3s ease;
        }

        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    
    <div class="visual-background">
        <div class="glow-spot-container">
            <div class="glow-spot spot-1"></div>
            <div class="glow-spot spot-2"></div>
        </div>
    </div>

    <!-- 海浪元素 -->
    <div class="ocean-waves">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="content-wrapper">
        <header>
            <div class="typewriter-container">
                <span class="typewriter-line typewriter-line-1">PENGHU</span>
                <span class="typewriter-line typewriter-line-2">VOYAGE</span>
            </div>

            <div class="flex flex-col gap-6 mb-10 md:mb-16 fade-in" style="animation-delay: 0.5s">
                <div>
                    <p class="text-[11px] sub-accent uppercase">5-Day Scooter Exploration / Coastal Scenery</p>
                    <div class="flex flex-wrap gap-2 mt-3">
                        <span class="info-pill">May 08 - 12, 2026</span>
                        <span class="info-pill">Stay: 綠的旅店 Green Hotel</span>
                    </div>
                </div>
                <div class="flex justify-between items-end border-t border-black/5 pt-4">
                    <div class="flex gap-4 md:gap-8">
                        <div>
                            <p class="text-[8px] uppercase opacity-40 font-bold tracking-wider">Dep. Flight</p>
                            <p class="text-[11px] font-medium">08:00 - 09:00</p>
                        </div>
                        <div>
                            <p class="text-[8px] uppercase opacity-40 font-bold tracking-wider">Ret. Flight</p>
                            <p class="text-[11px] font-medium">16:50 - 17:45</p>
                        </div>
                    </div>
                    <p class="text-[10px] font-light opacity-30 italic">Ver 6.3 Updated Itinerary</p>
                </div>
            </div>
        </header>

        <nav class="flex gap-6 md:gap-8 mb-8 no-scrollbar overflow-x-auto fade-in" style="animation-delay: 0.7s">
            <span onclick="renderDay(1)" id="btn1" class="nav-link active">D1 市區</span>
            <span onclick="renderDay(2)" id="btn2" class="nav-link">D2 望安</span>
            <span onclick="renderDay(3)" id="btn3" class="nav-link">D3 北環</span>
            <span onclick="renderDay(4)" id="btn4" class="nav-link">D4 南環</span>
            <span onclick="renderDay(5)" id="btn5" class="nav-link">D5 歸途</span>
        </nav>

        <div id="itinerary" class="itinerary-card fade-in" style="animation-delay: 0.9s">
            <!-- JS 內容 -->
        </div>

        <footer class="mt-20 pb-24 text-center">
            <p class="text-[9px] font-medium tracking-[1.2em] uppercase opacity-20">Summer Dreams in Penghu</p>
        </footer>
    </div>

    <script>
        const schedule = {
            1: {
                region: "馬公市區與暖身",
                location: "澎湖本島 (Main Island)",
                items: [
                    { time: "08:00", name: "AE365 台北松山起飛", note: "松山機場 T2 出發，建議提前 1 小時報到" },
                    { time: "09:00", name: "抵達澎湖機場", note: "開啟五天四夜的湛藍之旅" },
                    { time: "09:45", name: "領機車 / 旅店寄物", note: "於機場領機車，先去「綠的旅店」寄放行李" },
                    { time: "11:30", name: "小紅莓小吃店", note: "品嚐在地日常美味，推薦鮮魚湯與特色小吃" },
                    { time: "13:30", name: "篤行十村", note: "澎湖最古老眷村，拜訪潘安邦故居，漫步復古街道" },
                    { time: "15:00", name: "觀音亭周邊", note: "欣賞西瀛虹橋，預覽花火節場地與湛藍海景" },
                    { time: "16:30", name: "驚蟄茶室", note: "純白質感空間，品味島嶼午後的靜謐茶香" },
                    { time: "17:30", name: "紫玉仙草", note: "澎湖必吃！滿滿料的仙草冰作為能量補給" },
                    { time: "18:30", name: "漁人廚房", note: "職人海鮮料理，享受極致鮮甜的海味饗宴" },
                    { time: "21:00", name: "中央老街夜拍", note: "避開人潮，享受古樸街道的靜謐氛圍" },
                    { time: "21:20", name: "四眼井許家店風茹茶", note: "澎湖在地青草茶代表" },
                    { time: "22:00", name: "Pier3 三號港散步", note: "港邊散步區，吹冷氣、休息或選購免稅品" }
                ]
            },
            2: {
                region: "望安島跳島巡禮",
                location: "南海離島 (South Sea Islands)",
                items: [
                    { time: "09:30", name: "南海遊客中心搭船", note: "乘船前往南海遺珠「望安島」，享受外島時光" },
                    { time: "10:45", name: "網垵口沙灘", note: "超美半月形海灣，享受純淨晨間海色" },
                    { time: "11:30", name: "永發小吃部", note: "望安島推薦午餐：海鮮麵、小卷料理" },
                    { time: "13:00", name: "花宅聚落", note: "咕咾石牆間的歲月回憶，尋訪百年中社古厝" },
                    { time: "13:40", name: "蜜月島黑糖糕", note: "望安特產黑糖糕，口感綿密紮實" },
                    { time: "14:10", name: "仙人掌冷飲店", note: "回碼頭前的最後消暑補給" },
                    { time: "14:30", name: "望安碼頭搭船返航", note: "準時搭船返回馬公本島" },
                    { time: "18:30", name: "福牡蠣屋", note: "推薦鮮美牡蠣醬飯與手蒸鮮蚵" },
                    { time: "20:30", name: "山水沙灘夜晚吹風", note: "到山水沙灘聽浪聲、吹海風，極致放鬆" }
                ]
            },
            3: {
                region: "西嶼北環與港灣月色",
                location: "澎湖本島 (Main Island)",
                items: [
                    { time: "11:30", name: "小萍的店", note: "北環必吃！鮮甜小卷麵線創始店" },
                    { time: "13:00", name: "二崁聚落保存區", note: "傳統聚落工藝建築，文化深度巡禮" },
                    { time: "13:30", name: "二崁杏仁茶", note: "古宅濃郁杏仁香，二崁下午茶靈魂" },
                    { time: "14:30", name: "魚好。刺身專門店", note: "職人手感，每日限量的新鮮刺身" },
                    { time: "15:30", name: "大池炸粿＆鯊魚排", note: "現炸酥脆！在地驚喜海味炸物" },
                    { time: "17:00", name: "風櫃洞", note: "奇特海蝕地景，聽風櫃聽濤的震撼聲" },
                    { time: "18:00", name: "摩西分海 (奎壁山)", note: "大自然在海中開路的壯麗瞬間" },
                    { time: "19:30", name: "湖光食客", note: "回馬公後的質感晚餐" },
                    { time: "20:50", name: "十五月茶飲-海龜蛋燒", note: "特色仙人掌冰茶" },
                    { time: "21:50", name: "金龜頭砲台夜景", note: "看港口夜景、吹吹海風放空" }
                ]
            },
            4: {
                region: "南環浮潛與花火之夜",
                location: "澎湖本島 (Main Island)",
                items: [
                    { time: "11:00", name: "椒麻皮蛋麵", note: "南環著名的香麻開胃料理" },
                    { time: "13:00", name: "薰衣草森林浮潛", note: "沈浸在紫色珊瑚群的夢幻海底世界" },
                    { time: "15:30", name: "回旅店休息", note: "浮潛後回旅店梳洗、恢復體力" },
                    { time: "17:30", name: "時裡沙灘", note: "夕陽下的金黃沙灘，溫柔的踏浪時光" },
                    { time: "17:50", name: "三哥酒釀雞排", note: "澎湖超人氣！推薦酒釀雞排、雞肉串，卡位必備補給" },
                    { time: "18:30", name: "觀音亭卡位", note: "花火節人多，建議提早找好觀賞位，邊享用雞排" },
                    { time: "21:00", name: "花火節祭典", note: "視覺與聽覺交織的最震撼篇章" },
                    { time: "22:30", name: "友先燒烤", note: "煙火後的熱血 BBQ 聚餐，大啖鮮烤蚵" }
                ]
            },
            5: {
                region: "悠閒收尾歸途",
                location: "澎湖本島 (Main Island)",
                items: [
                    { time: "11:00", name: "旅店退房 Check-out", note: "行李可先寄放旅店，輕鬆度過最後半日" },
                    { time: "11:30", name: "朝食暮饗", note: "推薦小管蛋餅、仙人掌奶茶" },
                    { time: "13:00", name: "伴手禮採買", note: "最後掃貨" },
                    { time: "14:00", name: "𝐧𝐢𝐤𝐨𝐧𝐢 咖啡", note: "日系老宅咖啡廳，享受靜謐午後" },
                    { time: "15:40", name: "機場還車 / 報到", note: "建議提早 1 小時到達機場辦理手續" },
                    { time: "16:50", name: "AE374 返程起飛", note: "帶著滿滿回憶飛往台北松山" }
                ]
            }
        };

        function renderDay(day) {
            document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn${day}`).classList.add('active');
            
            const data = schedule[day];
            const container = document.getElementById('itinerary');
            
            let html = `
                <div class="fade-in mb-8">
                    <div class="flex items-center gap-3 mb-2">
                        <span class="text-[9px] tracking-[0.3em] sequence-tag uppercase">SEQ 0${day}</span>
                        <span class="text-[9px] tracking-[0.1em] opacity-30 uppercase font-bold border-l border-black/10 pl-3">${data.location}</span>
                    </div>
                    <h2 class="text-xl md:text-2xl font-medium text-gray-900">${day === 5 ? "D5｜5/12 悠閒歸途" : data.region}</h2>
                </div>
            `;

            data.items.forEach((item, index) => {
                const mapLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.name + ' 澎湖')}`;
                html += `
                    <div class="schedule-row fade-in" style="animation-delay: ${index * 0.05}s">
                        <div class="time-label">${item.time}</div>
                        <div class="pr-2">
                            <div class="spot-name">${item.name}</div>
                            <div class="spot-note">${item.note}</div>
                        </div>
                        <a href="${mapLink}" target="_blank" class="map-btn" title="查看地圖">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 0 5z"/>
                            </svg>
                        </a>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        renderDay(1);
    </script>
</body>
</html>
