<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PENGHU VOYAGE | 5-Day Interactive Itinerary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Noto+Sans+TC:wght@100;300;400;500;700&display=swap');
        
        :root {
            --neon-green: #67e644; 
            --neon-green-dark: #4eb032;
            --neon-glow: rgba(103, 230, 68, 0.4);
            --noto-bg: #fdfdfb;
            --glow-main: var(--neon-glow);
            --glow-sub: rgba(163, 255, 51, 0.2);
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            font-weight: 300;
            background-color: var(--noto-bg);
            color: #1a1a1a;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            touch-action: pan-y;
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.05;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        .visual-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .glow-spot-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
        }
        .glow-spot {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            mix-blend-mode: multiply;
            animation: glowMove 15s infinite alternate ease-in-out;
        }
        .spot-1 { width: 650px; height: 650px; background: radial-gradient(circle, var(--glow-main) 0%, rgba(255,255,255,0) 75%); top: -15%; left: -10%; animation-duration: 12s; }
        .spot-2 { width: 550px; height: 550px; background: radial-gradient(circle, var(--glow-sub) 0%, rgba(255,255,255,0) 70%); top: 35%; right: -15%; animation-delay: -3s; animation-duration: 18s; }
        
        @keyframes glowMove {
            0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            50% { transform: translate(5vw, 10vh) scale(1.1); opacity: 0.9; }
            100% { transform: translate(-3vw, 5vh) scale(0.95); opacity: 0.6; }
        }

        .ocean-waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12vh; 
            z-index: 2;
            pointer-events: none;
        }
        .wave {
            background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x;
            position: absolute;
            bottom: -5px;
            width: 6400px;
            height: 100%;
            animation: wave 25s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            filter: hue-rotate(45deg) brightness(1.2); 
            transform: translate3d(0, 0, 0);
        }
        .wave-back {
            bottom: 5px;
            opacity: 0.3;
            animation: wave 30s cubic-bezier(0.36, 0.45, 0.63, 0.53) -2s infinite;
            filter: hue-rotate(35deg) brightness(1.1);
        }
        .wave-front {
            opacity: 0.6;
            animation: wave 22s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
        }
        @keyframes wave { 0% { margin-left: 0; } 100% { margin-left: -1600px; } }

        .typewriter-container {
            margin-bottom: 3rem;
            padding: 2rem 0;
            min-height: 220px;
        }
        .typewriter-line {
            font-size: clamp(3.5rem, 15vw, 6rem);
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: -0.03em;
            color: #000;
            display: block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid transparent;
            width: 0;
            line-height: 1.1;
        }
        .typewriter-line-1 { animation: typingCycle 8s steps(6, end) infinite, blinkCursor 0.8s step-end infinite; }
        .typewriter-line-2 { animation: typingCycle 8s steps(7, end) 1.2s infinite, blinkCursor 0.8s step-end infinite 1.2s; }
        @keyframes typingCycle { 0% { width: 0; } 20%, 80% { width: 100%; } 90%, 100% { width: 0; } }
        @keyframes blinkCursor { from, to { border-color: transparent } 50% { border-color: var(--neon-green) } }

        .content-wrapper {
            position: relative;
            z-index: 10;
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
        }

        .nav-link {
            font-size: 12px;
            font-weight: 300;
            color: #aaa;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: all 0.4s ease;
            position: relative;
            padding: 5px 0 12px 0;
            white-space: nowrap;
        }
        .nav-link.active { color: var(--neon-green-dark); font-weight: 600; }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon-green);
            border-radius: 1px;
        }

        .itinerary-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 2.5rem;
            padding: 1.5rem;
            box-shadow: 0 20px 45px rgba(0,0,0,0.02);
            position: relative;
            z-index: 10;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        @media (min-width: 768px) { .itinerary-card { padding: 3.5rem; border-radius: 3.5rem; } }

        .schedule-row {
            display: grid;
            grid-template-columns: 30px 60px 1fr 40px;
            gap: 12px;
            padding: 22px 0;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            align-items: flex-start;
            transition: background 0.2s ease;
        }
        .schedule-row:hover { background: rgba(255,255,255,0.4); }

        .travel-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0 10px 42px;
            font-size: 10px;
            color: #999;
            font-style: italic;
            border-left: 1px dashed #ddd;
            margin-left: 45px;
        }

        .drag-handle {
            cursor: grab; color: #ddd; padding-top: 5px;
            display: flex; align-items: center; justify-content: center;
        }
        .drag-handle:active { cursor: grabbing; }

        .time-label { 
            font-size: 11px; font-weight: 600; color: var(--neon-green-dark); 
            font-family: 'Inter'; padding-top: 5px; letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }
        .spot-name { font-size: 17px; font-weight: 500; color: #1a1a1a; }
        .spot-note { font-size: 11px; color: #666; margin-top: 4px; font-weight: 300; opacity: 0.8; line-height: 1.5; }

        .map-btn {
            width: 36px; height: 36px; border-radius: 10px;
            background: #f4faf2;
            display: flex; align-items: center; justify-content: center;
            color: var(--neon-green-dark);
            transition: all 0.3s ease;
        }

        .sortable-ghost { opacity: 0.2; background: var(--neon-green) !important; }
        .sortable-chosen { background: rgba(255,255,255,0.8); }

        .slide-left { animation: slideLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .slide-right { animation: slideRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideLeft { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideRight { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .flight-card {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            padding: 1.25rem;
            border: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    
    <div class="visual-background">
        <div class="glow-spot-container">
            <div class="glow-spot spot-1"></div>
            <div class="glow-spot spot-2"></div>
        </div>
    </div>

    <div class="ocean-waves">
        <div class="wave wave-back"></div>
        <div class="wave wave-front"></div>
    </div>

    <div class="content-wrapper">
        <header>
            <div class="typewriter-container">
                <span class="typewriter-line typewriter-line-1">PENGHU</span>
                <span class="typewriter-line typewriter-line-2">VOYAGE</span>
            </div>

            <div class="flex flex-col gap-6 mb-10 md:mb-16">
                <div>
                    <p class="text-[11px] font-bold text-green-600 uppercase tracking-widest">5-Day Interactive Exploration</p>
                    <div class="flex flex-wrap gap-2 mt-3">
                        <span class="text-[10px] px-3 py-1 bg-white border border-black/5 rounded-full text-gray-500">2026/05/08 － 05/12</span>
                        <span class="text-[10px] px-3 py-1 bg-white border border-black/5 rounded-full text-gray-500">住宿：澎湖綠的旅店</span>
                    </div>
                </div>

                <!-- 航班資訊設計 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flight-card">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-bold text-green-600 uppercase tracking-tighter">去程 DEPARTURE</span>
                            <span class="text-[11px] font-medium text-gray-400">AE365</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <div>
                                <div class="text-[9px] text-gray-400 mb-1">2026/05/08 (五)</div>
                                <div class="text-xl font-light">08:00</div>
                                <div class="text-[10px] text-gray-500">台北松山 T2</div>
                            </div>
                            <div class="flex-1 flex justify-center pb-2 px-4">
                                <div class="w-full h-[1px] bg-gray-200 relative">
                                    <div class="absolute -top-[3px] right-0 w-[7px] h-[7px] border-r border-t border-gray-300 rotate-45"></div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-[9px] text-gray-400 mb-1">&nbsp;</div>
                                <div class="text-xl font-light">09:00</div>
                                <div class="text-[10px] text-gray-500">抵達澎湖</div>
                            </div>
                        </div>
                    </div>

                    <div class="flight-card">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-bold text-green-600 uppercase tracking-tighter">回程 RETURN</span>
                            <span class="text-[11px] font-medium text-gray-400">AE374</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <div>
                                <div class="text-[9px] text-gray-400 mb-1">2026/05/12 (二)</div>
                                <div class="text-xl font-light">16:50</div>
                                <div class="text-[10px] text-gray-500">澎湖馬公</div>
                            </div>
                            <div class="flex-1 flex justify-center pb-2 px-4">
                                <div class="w-full h-[1px] bg-gray-200 relative">
                                    <div class="absolute -top-[3px] right-0 w-[7px] h-[7px] border-r border-t border-gray-300 rotate-45"></div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-[9px] text-gray-400 mb-1">&nbsp;</div>
                                <div class="text-xl font-light">17:45</div>
                                <div class="text-[10px] text-gray-500">台北松山</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <nav id="day-nav" class="flex gap-6 md:gap-8 mb-8 no-scrollbar overflow-x-auto border-b border-black/5">
            <span onclick="goToDay(1)" id="btn1" class="nav-link active">D1 市區</span>
            <span onclick="goToDay(2)" id="btn2" class="nav-link">D2 望安</span>
            <span onclick="goToDay(3)" id="btn3" class="nav-link">D3 北環</span>
            <span onclick="goToDay(4)" id="btn4" class="nav-link">D4 浮潛</span>
            <span onclick="goToDay(5)" id="btn5" class="nav-link">D5 歸途</span>
        </nav>

        <div id="swipe-area">
            <div id="itinerary" class="itinerary-card"></div>
        </div>

        <footer class="mt-20 pb-24 text-center">
            <p class="text-[9px] font-medium tracking-[1.2em] uppercase opacity-20">Summer Dreams in Penghu</p>
        </footer>
    </div>

    <script>
        const schedule = {
            1: { region: "馬公市區暖身日", location: "澎湖本島", startTime: "09:00", items: [
                { duration: 15, travelNext: 15, name: "AE365 抵達澎湖", note: "開啟湛藍之旅" },
                { duration: 45, travelNext: 10, name: "領機車 / 綠的旅店寄放行李", note: "機場至市區機車約15分鐘" },
                { duration: 80, travelNext: 5,  name: "小紅莓小吃店", note: "美味午餐，近篤行十村" },
                { duration: 80, travelNext: 5,  name: "篤行十村", note: "文青散步拍照" },
                { duration: 80, travelNext: 5,  name: "觀音亭周邊", note: "欣賞西瀛虹橋" },
                { duration: 120, travelNext: 5,  name: "驚蟄茶室", note: "質感午茶時光" },
                { duration: 30, travelNext: 5,  name: "紫玉仙草", note: "市區消暑聖品" },
                { duration: 90, travelNext: 5,  name: "漁人廚房", note: "晚餐時段，職人海味" },
                { duration: 15, travelNext: 3,  name: "中央老街 / 四眼井夜拍", note: "古街巡禮" },
                { duration: 35, travelNext: 5,  name: "四眼井許家店風茹茶", note: "在地特產飲品" },
                { duration: 60, travelNext: 0,  name: "Pier3 三號港港邊散步", note: "夜間港灣美景" }
            ]},
            2: { region: "望安島跳島日", location: "望安島", startTime: "09:30", items: [
                { duration: 75, travelNext: 0,  name: "南海遊客中心搭船至望安", note: "乘風破浪約75分鐘" },
                { duration: 35, travelNext: 8,  name: "望安網垵口沙灘", note: "望安最美沙灘，碼頭騎車約5-8分鐘" },
                { duration: 40, travelNext: 5,  name: "永發小吃部", note: "午餐時間，望安市中心" },
                { duration: 35, travelNext: 5,  name: "花宅聚落", note: "古厝建築，望安景點距離近" },
                { duration: 15, travelNext: 3,  name: "蜜月島黑糖糕", note: "在地手工甜點" },
                { duration: 25, travelNext: 10, name: "仙人掌冷飲店", note: "返回碼頭前的清涼" },
                { duration: 120, travelNext: 0, name: "搭船返回馬公", note: "船程約75-90分鐘" },
                { duration: 135, travelNext: 10, name: "福牡蠣屋", note: "飽餐一頓，市區騎車約5-10分鐘" },
                { duration: 105, travelNext: 20, name: "友先燒烤", note: "宵夜派對，市區至郊區約15-20分鐘" },
                { duration: 60, travelNext: 0,  name: "山水沙灘夜晚吹風", note: "海風輕拂收尾" }
            ]},
            3: { region: "西嶼北環日", location: "澎湖本島 (西嶼)", startTime: "11:00", items: [
                { duration: 50, travelNext: 15, name: "小萍的店", note: "跨海大橋至小萍的店約10分鐘" },
                { duration: 30, travelNext: 10, name: "二崁聚落保存區", note: "小卷麵線後移動至二崁" },
                { duration: 70, travelNext: 5,  name: "二崁杏仁茶", note: "聚落內步行即可" },
                { duration: 80, travelNext: 10, name: "魚好。刺身專門店", note: "二崁至大池約8-10分鐘" },
                { duration: 80, travelNext: 40, name: "大池炸粿＆鯊魚排", note: "大跨度移動：西嶼至馬公郊區" },
                { duration: 60, travelNext: 35, name: "風櫃洞", note: "大跨度移動：風櫃至湖西奎壁山" },
                { duration: 60, travelNext: 25, name: "奎壁山摩西分海", note: "奎壁山回市區車程約25分鐘" },
                { duration: 65, travelNext: 10, name: "湖光食客 Lakeshore Foodie", note: "特色晚餐" },
                { duration: 15, travelNext: 5,  name: "阿家生蠔", note: "市區補給" },
                { duration: 15, travelNext: 5,  name: "十五月茶飲-海龜蛋燒", note: "可愛點心" },
                { duration: 25, travelNext: 10, name: "文康商圈宵夜散步", note: "市區漫遊" },
                { duration: 30, travelNext: 0,  name: "第三漁港夜晚散步", note: "港邊靜謐" }
            ]},
            4: { region: "浮潛 × 花火節日", location: "澎湖本島", startTime: "11:00", items: [
                { duration: 100, travelNext: 25, name: "椒麻皮蛋麵", note: "市區至南環車程約20-25分鐘" },
                { duration: 160, travelNext: 25, name: "薰衣草森林浮潛", note: "海底世界探索" },
                { duration: 50, travelNext: 20, name: "回綠的旅店休息", note: "浮潛後盥洗充電" },
                { duration: 35, travelNext: 5,  name: "時裡沙灘", note: "南環最細緻沙灘" },
                { duration: 45, travelNext: 20, name: "澎湖三哥酒釀雞排", note: "返回市區卡位花火節" },
                { duration: 150, travelNext: 0, name: "觀音亭卡位", note: "等待璀璨時刻" },
                { duration: 60, travelNext: 0,  name: "澎湖花火節（觀音亭）", note: "夜空盛宴" },
                { duration: 90, travelNext: 0,  name: "自由回飯店 / 超商補給", note: "輕鬆收尾" }
            ]},
            5: { region: "悠閒收尾日", location: "澎湖本島", startTime: "11:00", items: [
                { duration: 25, travelNext: 5,  name: "綠的旅店退房 / 寄物", note: "最後整理" },
                { duration: 80, travelNext: 5,  name: "朝食暮饗", note: "市區內機車5分鐘內" },
                { duration: 50, travelNext: 5,  name: "中央老街伴手禮散步", note: "最後採買" },
                { duration: 70, travelNext: 8,  name: "𝐧𝐢𝐤𝐨𝐧𝐢", note: "寧靜午茶時光" },
                { duration: 15, travelNext: 8,  name: "返回綠的旅店拿行李", note: "準備歸途" },
                { duration: 65, travelNext: 15, name: "機場還車 / Check-in", note: "市區至機場約15-20分鐘" },
                { duration: 60, travelNext: 0,  name: "AE374 澎湖 → 台北松山", note: "17:45 抵達台北松山" }
            ]}
        };

        let currentDay = 1;
        let startSwipeX = 0;
        let isDragging = false;

        function calculateTime(startTimeStr, totalMinutes) {
            const [hours, minutes] = startTimeStr.split(':').map(Number);
            const date = new Date();
            date.setHours(hours, minutes + totalMinutes, 0);
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        function renderDay(day, direction = 'none') {
            const data = schedule[day];
            const container = document.getElementById('itinerary');
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const activeNav = document.getElementById(`btn${day}`);
            if (activeNav) {
                activeNav.classList.add('active');
                activeNav.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }

            container.className = 'itinerary-card ' + (direction === 'left' ? 'slide-left' : direction === 'right' ? 'slide-right' : '');

            let html = `
                <div class="mb-8">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-3">
                            <span class="text-[9px] tracking-[0.3em] font-bold text-green-600 uppercase">DAY 0${day}</span>
                            <span class="text-[9px] px-1.5 py-0.5 bg-green-50 text-green-600/70 rounded font-bold border border-green-200/50">${data.location}</span>
                        </div>
                    </div>
                    <h2 class="text-xl md:text-2xl font-medium text-gray-900">${data.region}</h2>
                </div>
                <div id="sortable-list">
            `;

            let accumulated = 0;
            data.items.forEach((item, index) => {
                const displayTime = calculateTime(data.startTime, accumulated);
                
                html += `
                    <div class="item-group">
                        <div class="schedule-row" data-id="${index}">
                            <div class="drag-handle">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="2">
                                    <circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/>
                                    <circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/>
                                </svg>
                            </div>
                            <div class="time-label">${displayTime}</div>
                            <div class="pr-2">
                                <div class="spot-name">${item.name}</div>
                                <div class="spot-note">${item.note}</div>
                                <div class="text-[9px] text-gray-300 mt-1 uppercase font-bold tracking-widest">停留 ${item.duration}m</div>
                            </div>
                            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.name + ' 澎湖')}" target="_blank" class="map-btn">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 0 5z"/>
                                </svg>
                            </a>
                        </div>
                        ${item.travelNext > 0 ? `
                        <div class="travel-row">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="5" y="11" width="14" height="8" rx="2"/><circle cx="8" cy="19" r="2"/><circle cx="16" cy="19" r="2"/>
                                <path d="M17 11V7l-5-4-5 4v4"/>
                            </svg>
                            Google Maps 預估機車：${item.travelNext} 分鐘
                        </div>` : ''}
                    </div>
                `;
                accumulated += (item.duration + (item.travelNext || 0));
            });

            html += `</div>`;
            container.innerHTML = html;

            Sortable.create(document.getElementById('sortable-list'), {
                animation: 250,
                handle: ".drag-handle",
                ghostClass: "sortable-ghost",
                chosenClass: "sortable-chosen",
                onEnd: function(evt) {
                    const items = schedule[day].items;
                    const movedItem = items.splice(evt.oldIndex, 1)[0];
                    items.splice(evt.newIndex, 0, movedItem);
                    renderDay(day);
                }
            });
        }

        function goToDay(day) {
            if (day === currentDay) return;
            const direction = day > currentDay ? 'left' : 'right';
            currentDay = day;
            renderDay(day, direction);
        }

        const swipeArea = document.getElementById('swipe-area');
        swipeArea.addEventListener('touchstart', e => { startSwipeX = e.touches[0].clientX; isDragging = true; }, { passive: true });
        swipeArea.addEventListener('touchend', e => {
            if (!isDragging) return;
            const diffX = startSwipeX - e.changedTouches[0].clientX;
            if (Math.abs(diffX) > 70) {
                if (diffX > 0 && currentDay < 5) goToDay(currentDay + 1);
                else if (diffX < 0 && currentDay > 1) goToDay(currentDay - 1);
            }
            isDragging = false;
        });

        window.onload = () => renderDay(1);
    </script>
</body>
</html>
